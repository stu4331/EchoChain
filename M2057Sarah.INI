[VoiceSetting]
VolumeAdjustment=100
RateAdjustment=100
DurationHeqAdjustment=50
LogF0HeqAdjustment=50

[SilenceLength]
WordBoundary=0
IntermPhraseBoundary=0
IntonationPhraseBoundary=200
SentenceBoundary=700

[LsfSharpen]
MultipleInterval=yes
Intervals=2
Iterations=5
Step=0.25
LowFrequency=0.075
HighFrequency=0.4

[UVDecision]
FrameLevel=yes

[Domain]
Number=2
Domain0=voiceAssistant
SeparateRUSPrefix0=NUSData
NusData0=voiceAssistant.TNU
Domain1=tbtdirection
SeparateRUSPrefix1=NUSData
NusData1=tbtdirection.TNU

[MSPromptMapping] 
places=voiceAssistant
speechux=voiceAssistant

[LatticeGeneration]
AcousticTableCacheSize=1000000000

[PhoneDuration]
Weight=90

[MultiBandExcitation]
Enabled=true

[LSPDecomposing]
DelayMode=1

[NN]
PredictorThreadNumber=2
PredictorBatchSize=8
SkipFrameCount=2
FrameSkippingVarScaleFactor=10
EnableStreaming=true

[Output]
EnableBuffer=true
BatchSize=16000

[Pipeline]
ParallelProcess=yes
